name: Deploy Backend to AWS Lambda

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [core, adopciones, mascotas, perdidas, carnet, directorio, ecommerce, paseadores, cuidadores, funeraria, laboratorio, aseguradoras, estilistas, entrenadores, transportistas, patrocinadores, establecimientos]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Debug Secrets (Check if set)
      run: |
        if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
          echo "Error: AWS_ACCESS_KEY_ID is NOT set in GitHub Secrets"
          exit 1
        else
          echo "AWS_ACCESS_KEY_ID is found"
        fi

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies and Package
      run: |
        cd backend/michicondrias_${{ matrix.service }}
        # Instalar dependencias usando la imagen oficial de Amazon Linux para evitar errores de GLIBC_2.28
        docker run --rm -v ${{ github.workspace }}/backend/michicondrias_${{ matrix.service }}:/var/task public.ecr.aws/sam/build-python3.11 pip install -r requirements.txt -t .
        # Comprimir el código y las dependencias ya compatibles con Lambda
        zip -r ../../${{ matrix.service }}.zip .

    - name: Upload to S3
      run: |
        aws s3 cp ${{ matrix.service }}.zip s3://michicondrias-storage-1/deployments/${{ matrix.service }}.zip

    - name: Deploy to AWS Lambda (via S3)
      run: |
        # 1. Verificar y desplegar/crear la función Lambda
        if aws lambda get-function --function-name michicondrias-${{ matrix.service }} --region us-east-1 >/dev/null 2>&1; then
          echo "La función existe. Actualizando código..."
          aws lambda update-function-code \
            --function-name michicondrias-${{ matrix.service }} \
            --s3-bucket michicondrias-storage-1 \
            --s3-key deployments/${{ matrix.service }}.zip \
            --region us-east-1
          echo "Esperando a que la actualización del código se complete..."
          aws lambda wait function-updated --function-name michicondrias-${{ matrix.service }} --region us-east-1
        else
          echo "La función NO existe. Obteniendo rol de IAM desde core..."
          ROLE_ARN=$(aws lambda get-function-configuration --function-name michicondrias-core --region us-east-1 --query "Role" --output text)
          echo "Creando función Lambda michicondrias-${{ matrix.service }}..."
          aws lambda create-function \
            --function-name michicondrias-${{ matrix.service }} \
            --runtime python3.11 \
            --role $ROLE_ARN \
            --handler app.main.handler \
            --code S3Bucket=michicondrias-storage-1,S3Key=deployments/${{ matrix.service }}.zip \
            --timeout 30 \
            --memory-size 256 \
            --region us-east-1
          echo "Esperando a que la nueva función esté activa..."
          aws lambda wait function-active --function-name michicondrias-${{ matrix.service }} --region us-east-1
        fi

        # 1.5 Copiar variables de entorno desde core y configurar PROXY_PREFIX para el servicio actual
        echo "Copiando variables de entorno desde core para ${{ matrix.service }}..."
        ENV_VARS=$(aws lambda get-function-configuration --function-name michicondrias-core --region us-east-1 --query "Environment.Variables" --output json)
        UPDATED_ENV=$(echo $ENV_VARS | jq -c '. + {"PROXY_PREFIX": "/${{ matrix.service }}"}')
        FINAL_ENV_JSON=$(jq -c -n --argjson vars "$UPDATED_ENV" '{"Variables": $vars}')
        aws lambda update-function-configuration \
          --function-name michicondrias-${{ matrix.service }} \
          --environment "$FINAL_ENV_JSON" \
          --region us-east-1

        # 2. Configurar enrutamiento en API Gateway de forma dinámica
        API_ID="kowly51wia"
        ACCOUNT_ID="491799435777"
        REGION="us-east-1"
        LAMBDA_ARN="arn:aws:lambda:$REGION:$ACCOUNT_ID:function:michicondrias-${{ matrix.service }}"

        echo "Verificando integración de API Gateway para ${{ matrix.service }}..."
        INTEGRATION_ID=$(aws apigatewayv2 get-integrations --api-id $API_ID --region $REGION --query "Items[?contains(IntegrationUri, '$LAMBDA_ARN')].IntegrationId" --output text)

        if [ -z "$INTEGRATION_ID" ] || [ "$INTEGRATION_ID" = "None" ]; then
          echo "Creando integración de API Gateway para ${{ matrix.service }}..."
          INTEGRATION_ID=$(aws apigatewayv2 create-integration \
            --api-id $API_ID \
            --integration-type AWS_PROXY \
            --integration-uri $LAMBDA_ARN \
            --payload-format-version 2.0 \
            --region $REGION \
            --query "IntegrationId" --output text)
        fi
        echo "IntegrationId: $INTEGRATION_ID"

        # Verificar y crear ruta base: ANY /${{ matrix.service }}
        ROUTE_BASE="ANY /${{ matrix.service }}"
        ROUTE_BASE_ID=$(aws apigatewayv2 get-routes --api-id $API_ID --region $REGION --query "Items[?RouteKey=='$ROUTE_BASE'].RouteId" --output text)
        if [ -z "$ROUTE_BASE_ID" ] || [ "$ROUTE_BASE_ID" = "None" ]; then
          echo "Creando ruta base $ROUTE_BASE..."
          aws apigatewayv2 create-route \
            --api-id $API_ID \
            --route-key "$ROUTE_BASE" \
            --target "integrations/$INTEGRATION_ID" \
            --region $REGION
        fi

        # Verificar y crear ruta proxy: ANY /${{ matrix.service }}/{proxy+}
        ROUTE_PROXY="ANY /${{ matrix.service }}/{proxy+}"
        ROUTE_PROXY_ID=$(aws apigatewayv2 get-routes --api-id $API_ID --region $REGION --query "Items[?RouteKey=='$ROUTE_PROXY'].RouteId" --output text)
        if [ -z "$ROUTE_PROXY_ID" ] || [ "$ROUTE_PROXY_ID" = "None" ]; then
          echo "Creando ruta proxy $ROUTE_PROXY..."
          aws apigatewayv2 create-route \
            --api-id $API_ID \
            --route-key "$ROUTE_PROXY" \
            --target "integrations/$INTEGRATION_ID" \
            --region $REGION
        fi

        # Agregar permisos de ejecución a la Lambda para API Gateway
        echo "Asegurando permisos de ejecución de Lambda para API Gateway..."
        aws lambda add-permission \
          --function-name michicondrias-${{ matrix.service }} \
          --statement-id apigateway-invoke \
          --action lambda:InvokeFunction \
          --principal apigateway.amazonaws.com \
          --source-arn "arn:aws:execute-api:$REGION:$ACCOUNT_ID:$API_ID/*/*" \
          --region $REGION >/dev/null 2>&1 || true
